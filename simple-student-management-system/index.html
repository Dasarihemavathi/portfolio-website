<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Student Management System</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar" aria-label="Dashboard summary">
        <div>
          <p class="eyebrow">Student Records</p>
          <h1>Simple Student Management System</h1>
        </div>
        <div class="summary-grid">
          <article class="summary-card">
            <span id="totalStudents">0</span>
            <p>Total Students</p>
          </article>
          <article class="summary-card">
            <span id="averageGrade">0</span>
            <p>Average Grade</p>
          </article>
          <article class="summary-card">
            <span id="activeCourses">0</span>
            <p>Courses</p>
          </article>
        </div>
      </section>

      <section class="workspace">
        <form id="studentForm" class="student-form">
          <input type="hidden" id="studentId" />
          <div class="form-header">
            <div>
              <p class="eyebrow">Record Editor</p>
              <h2 id="formTitle">Add Student</h2>
            </div>
            <button type="button" id="resetButton" class="ghost-button">Clear</button>
          </div>

          <label>
            Full Name
            <input id="studentName" type="text" placeholder="Enter student name" required />
          </label>

          <label>
            Roll Number
            <input id="rollNumber" type="text" placeholder="Example: STU-101" required />
          </label>

          <label>
            Course
            <input id="course" type="text" placeholder="Example: Computer Science" required />
          </label>

          <div class="form-row">
            <label>
              Grade
              <input id="grade" type="text" inputmode="numeric" pattern="\\d{1,3}" placeholder="0-100" required />
            </label>

            <label>
              Email
              <input id="email" type="text" inputmode="email" placeholder="student@example.com" required />
            </label>
          </div>

          <button type="submit" class="primary-button" id="submitButton">Add Student</button>
        </form>

        <section class="records-panel" aria-label="Student records">
          <div class="records-toolbar">
            <div>
              <p class="eyebrow">Directory</p>
              <h2>Students</h2>
            </div>
            <input id="searchInput" type="search" placeholder="Search by name, roll number, or course" />
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Roll No.</th>
                  <th>Course</th>
                  <th>Grade</th>
                  <th>Email</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="studentTableBody"></tbody>
            </table>
            <div id="emptyState" class="empty-state" hidden>
              <h3>No students found</h3>
              <p>Add a student or adjust your search.</p>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
