<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interview Tracker</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="shell">
    <section class="topbar">
      <div>
        <p class="eyebrow">Hiring dashboard</p>
        <h1>Interview Tracking System</h1>
      </div>
      <button id="refreshBtn" type="button">Refresh</button>
    </section>

    <section class="metrics" id="metrics"></section>

    <section class="workspace">
      <form id="candidateForm" class="panel">
        <h2>Add Candidate</h2>
        <input name="name" placeholder="Candidate name" required>
        <input name="email" type="email" placeholder="Email address" required>
        <input name="phone" placeholder="Phone number">
        <input name="role" placeholder="Role applied for" required>
        <input name="experience" type="number" min="0" step="0.5" placeholder="Experience in years">
        <select name="status">
          <option>Applied</option>
          <option>Screening</option>
          <option>Technical</option>
          <option>HR</option>
          <option>Offered</option>
          <option>Hired</option>
          <option>Rejected</option>
        </select>
        <button type="submit">Save Candidate</button>
      </form>

      <section class="panel list-panel">
        <h2>Candidate Pipeline</h2>
        <div id="candidateList" class="candidate-list"></div>
      </section>
    </section>
  </main>

  <template id="candidateTemplate">
    <article class="candidate-card">
      <div class="candidate-head">
        <div>
          <h3></h3>
          <p class="candidate-meta"></p>
        </div>
        <select class="status-select"></select>
      </div>
      <div class="feedback-list"></div>
      <form class="feedback-form">
        <input name="round_name" placeholder="Round name" required>
        <input name="interviewer" placeholder="Interviewer" required>
        <input name="rating" type="number" min="1" max="5" placeholder="Rating" required>
        <input name="comments" placeholder="Feedback comments">
        <button type="submit">Add Feedback</button>
      </form>
    </article>
  </template>

  <script src="/static/app.js"></script>
</body>
</html>
