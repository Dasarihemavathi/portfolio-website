<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Classic Snake</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <header class="panel__header">
          <div>
            <p class="eyebrow">Classic arcade</p>
            <h1>Snake</h1>
          </div>
          <button id="restart-button" class="button" type="button">Restart</button>
        </header>

        <div class="stats" aria-label="Game stats">
          <div class="stat">
            <span class="stat__label">Score</span>
            <strong id="score">0</strong>
          </div>
          <div class="stat">
            <span class="stat__label">Status</span>
            <strong id="status">Running</strong>
          </div>
        </div>

        <div class="board-wrap">
          <div
            id="board"
            class="board"
            role="grid"
            aria-label="Snake game board"
          ></div>
          <div id="overlay" class="overlay" hidden>
            <p id="overlay-message">Game over</p>
            <button id="overlay-restart" class="button" type="button">Play again</button>
          </div>
        </div>

        <p class="help">
          Use arrow keys or WASD to move. Press space to pause or resume.
        </p>

        <section class="leaderboard" aria-label="Top scores">
          <h2>Top Scores</h2>
          <ol id="scores-list" class="scores-list"></ol>
        </section>

        <div class="controls" aria-label="Touch controls">
          <button class="control control--up" type="button" data-direction="up">Up</button>
          <button class="control control--left" type="button" data-direction="left">Left</button>
          <button class="control control--down" type="button" data-direction="down">Down</button>
          <button class="control control--right" type="button" data-direction="right">Right</button>
        </div>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
